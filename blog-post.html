  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('post-content');
      const urlParams = new URLSearchParams(window.location.search);
      const postName = urlParams.get('post');

      if (!postName) {
        container.innerHTML = '<div class="blog-error"><h2>Статья не указана</h2><a href="blog.html" class="btn btn-ghost">Вернуться к списку</a></div>';
        return;
      }

      try {
        const post = await loadSinglePost(postName);
        if (!post) throw new Error('Статья не найдена');

        document.title = post.title + ' | Родион Чавдар';
        
        const formattedDate = post.date ? new Date(post.date).toLocaleDateString('ru-RU', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Без даты';
        
        container.innerHTML = `
          <h1>${post.title}</h1>
          <div class="blog-post-meta">
            <span class="meta-chip">📅 ${formattedDate}</span>
            ${post.readTime ? `<span class="meta-chip">⏱️ ${post.readTime} мин</span>` : ''}
          </div>
          <div class="blog-post-content">${parseMarkdown(post.content)}</div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="blog-error"><h2>Ошибка загрузки</h2><p>${error.message}</p><a href="blog.html" class="btn btn-ghost">Вернуться к списку</a></div>`;
      }
    });
  </script>
